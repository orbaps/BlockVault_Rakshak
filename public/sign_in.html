<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLOCKVAULT | Sign In</title>
    <!-- Font: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        :root {
            --acid-green: #C1FF2F;
            --obsidian: #0A0A0B;
            --slate-soft: #1E293B;
            --glass-white: rgba(255, 255, 255, 0.03);
            --border-glow: rgba(193, 255, 47, 0.2);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--obsidian);
            color: white;
            overflow: hidden;
        }

        /* Grainy Texture Overlay */
        .grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .glass-card {
            background: var(--glass-white);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.02);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .input-field:focus-within {
            border-color: var(--acid-green);
            background: rgba(193, 255, 47, 0.02);
            box-shadow: 0 0 15px rgba(193, 255, 47, 0.1);
        }

        .btn-primary {
            background: var(--acid-green);
            color: black;
            font-weight: 800;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(193, 255, 47, 0.25);
        }

        .social-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Floating Animation */
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .float-subtle {
            animation: floating 4s ease-in-out infinite;
        }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8" x-data="{ mode: 'signin', loading: false }">
    <div class="grain"></div>

    <!-- Main Container -->
    <div class="w-full max-w-[1000px] h-full max-h-[700px] flex glass-card rounded-[32px] overflow-hidden shadow-2xl relative z-10">
        
        <!-- Left Side: Visual / Branding (Hidden on mobile) -->
        <div class="hidden lg:flex w-1/2 relative bg-black overflow-hidden border-r border-white/5">
            <img src="./blockvault_login_visual.png" alt="BlockVault Security" class="absolute inset-0 w-full h-full object-cover opacity-60 scale-110">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
            
            <div class="absolute inset-x-8 bottom-12 space-y-6">
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-[#C1FF2F] flex items-center justify-center rounded-xl shadow-[0_0_20px_rgba(193,255,47,0.2)]">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="8" /><line x1="12" y1="16" x2="12" y2="19" /><line x1="5" y1="12" x2="8" y2="12" /><line x1="16" y1="12" x2="19" y2="12" /><line x1="7.05" y1="7.05" x2="9.17" y2="9.17" /><line x1="14.83" y1="14.83" x2="16.95" y2="16.95" /><line x1="7.05" y1="16.95" x2="9.17" y2="14.83" /><line x1="14.83" y1="9.17" x2="16.95" y2="7.05" /></svg>
                    </div>
                    <span class="font-black text-2xl tracking-tighter uppercase">BlockVault</span>
                </div>
                
                <h2 class="text-4xl font-black leading-tight tracking-tighter uppercase italic">
                    The Security of <br><span class="text-[var(--acid-green)]">Blockchain.</span>
                </h2>
                
                <div class="flex items-center gap-4 pt-4">
                    <div class="flex -space-x-3">
                        <img src="https://i.pravatar.cc/100?u=11" class="w-10 h-10 rounded-full border-2 border-black" alt="user">
                        <img src="https://i.pravatar.cc/100?u=22" class="w-10 h-10 rounded-full border-2 border-black" alt="user">
                        <img src="https://i.pravatar.cc/100?u=33" class="w-10 h-10 rounded-full border-2 border-black" alt="user">
                    </div>
                    <p class="text-xs font-bold uppercase tracking-widest text-zinc-400">Join 10k+ verified users</p>
                </div>
            </div>

            <!-- Absolute decorative glow -->
            <div class="absolute -top-20 -left-20 w-64 h-64 bg-[var(--acid-green)] rounded-full mix-blend-screen blur-[100px] opacity-10"></div>
        </div>

        <!-- Right Side: Form -->
        <div class="w-full lg:w-1/2 p-8 md:p-12 flex flex-col justify-center overflow-y-auto">
            
            <!-- Header -->
            <div class="mb-10 text-center lg:text-left">
                <div class="flex items-center gap-2 lg:hidden mb-6">
                    <div class="w-6 h-6 bg-[#C1FF2F] flex items-center justify-center rounded-sm">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                    </div>
                    <span class="font-black text-lg tracking-tighter uppercase">BlockVault</span>
                </div>
                <h1 class="text-3xl font-black tracking-tighter uppercase mb-2" x-text="mode === 'signin' ? 'Welcome Back' : 'Create Account'"></h1>
                <p class="text-zinc-500 text-sm font-medium" x-text="mode === 'signin' ? 'Access your digital credential passport' : 'Start your journey with blockchain verification'"></p>
            </div>

            <!-- Form -->
            <form class="space-y-6" @submit.prevent="loading = true; setTimeout(() => { loading = false; window.location.href = '/' }, 1500)">
                
                <!-- Full Name (Sign Up only) -->
                <div x-show="mode === 'signup'" x-transition x-cloak class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 ml-1">Full Name</label>
                    <div class="input-field px-4 py-3">
                        <input type="text" placeholder="John Doe" class="bg-transparent border-none outline-none w-full text-sm font-bold placeholder:text-zinc-700 placeholder:font-medium">
                    </div>
                </div>

                <!-- Email -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 ml-1">Email Address</label>
                    <div class="input-field px-4 py-3 flex items-center gap-3">
                        <svg class="w-4 h-4 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        <input type="email" placeholder="name@company.com" class="bg-transparent border-none outline-none w-full text-sm font-bold placeholder:text-zinc-700 placeholder:font-medium">
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center ml-1">
                        <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Password</label>
                        <a href="#" x-show="mode === 'signin'" class="text-[10px] font-black uppercase tracking-widest text-[var(--acid-green)] hover:opacity-80 transition-opacity">Forgot?</a>
                    </div>
                    <div class="input-field px-4 py-3 flex items-center gap-3">
                        <svg class="w-4 h-4 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        <input type="password" placeholder="••••••••" class="bg-transparent border-none outline-none w-full text-sm font-bold placeholder:text-zinc-700 placeholder:font-medium">
                        <button type="button" class="text-zinc-600 hover:text-white transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2"></path><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" stroke-width="2"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-primary w-full py-4 flex items-center justify-center gap-3 group">
                    <template x-if="!loading">
                        <div class="flex items-center gap-3">
                            <span x-text="mode === 'signin' ? 'Sign In to Vault' : 'Create Your Passport'"></span>
                            <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        </div>
                    </template>
                    <template x-if="loading">
                        <div class="flex items-center gap-3">
                            <svg class="animate-spin h-5 w-5 text-black" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            <span class="uppercase tracking-widest text-xs">Authenticating...</span>
                        </div>
                    </template>
                </button>
            </form>

            <!-- Divider -->
            <div class="relative py-8">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
                <div class="relative flex justify-center text-[10px] uppercase font-black tracking-widest text-zinc-600"><span class="bg-[#0A0A0B] lg:bg-transparent px-4">Or continue with</span></div>
            </div>

            <!-- Social Buttons -->
            <div class="grid grid-cols-2 gap-4">
                <button class="social-btn py-3 flex items-center justify-center gap-3 group">
                    <svg class="w-4 h-4 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.9 3.22-1.9 4.26-1.2 1.2-3.08 2.44-6.04 2.44-4.82 0-8.58-3.9-8.58-8.72s3.76-8.72 8.58-8.72c2.6 0 4.5 1.02 5.9 2.34l2.3-2.3c-1.9-1.82-4.38-3.24-8.2-3.24C6.22 1.12 1.2 6.12 1.2 12.12s5.02 11 11.28 11c3.38 0 5.9-1.12 8.12-3.46 2.24-2.24 2.94-5.46 2.94-8.02 0-.78-.06-1.52-.18-2.2H12.48z"/></svg>
                    <span class="text-xs font-bold uppercase tracking-widest text-zinc-400 group-hover:text-white transition-colors">Google</span>
                </button>
                <button class="social-btn py-3 flex items-center justify-center gap-3 group">
                    <svg class="w-4 h-4 group-hover:scale-110 transition-transform" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482C19.137 20.164 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
                    <span class="text-xs font-bold uppercase tracking-widest text-zinc-400 group-hover:text-white transition-colors">Github</span>
                </button>
            </div>

            <!-- Footer Link -->
            <div class="mt-auto pt-10 text-center">
                <p class="text-xs font-bold uppercase tracking-widest text-zinc-600">
                    <span x-text="mode === 'signin' ? 'New to BlockVault?' : 'Already have a passport?'"></span>
                    <button type="button" @click="mode = mode === 'signin' ? 'signup' : 'signin'" class="text-[var(--acid-green)] ml-2 hover:underline decoration-2 underline-offset-4" x-text="mode === 'signin' ? 'Create Account' : 'Sign In'"></button>
                </p>
            </div>
        </div>

    </div>

    <!-- Background Decoration -->
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] pointer-events-none z-0">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-[var(--acid-green)] rounded-full mix-blend-screen blur-[150px] opacity-[0.03] animate-pulse"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-blue-600 rounded-full mix-blend-screen blur-[150px] opacity-[0.03] animate-pulse" style="animation-delay: 2s"></div>
    </div>

</body>
</html>
